  <section id="trend-chart">
    <h2>Trend Chart of Seats Over Time</h2>
    <canvas id="seatsChart"></canvas>
    <script>
      fetch('polls-data.json')
        .then(response => response.json())
        .then(data => {
          const ctx = document.getElementById('seatsChart').getContext('2d');
          const chart = new Chart(ctx, {
            type: 'line',
            data: {
              labels: data.labels,
              datasets: [{
                label: 'Seats',
                data: data.seats,
                borderColor: 'rgba(75, 192, 192, 1)',
                fill: false
              }]
            },
            options: {
              responsive: true,
              scales: {
                x: {
                  title: {
                    display: true,
                    text: 'Time'
                  }
                },
                y: {
                  title: {
                    display: true,
                    text: 'Seats'
                  }
                }
              }
            }
          });
        });
    </script>
  </section>

  <section id="map">
