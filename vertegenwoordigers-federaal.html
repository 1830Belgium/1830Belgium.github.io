<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Federaal parlement — interactieve kaart</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:#f8f7f4;
  color:#1a1a1a;
}

/* HEADER */
header{
  background:white;
  padding:16px 24px;
  border-bottom:1px solid rgba(0,0,0,0.1);
  font-weight:600;
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns: 1.2fr 1fr;
  height:calc(100vh - 60px);
}

/* MAP */
.map{
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:12px;
  padding:24px;
  align-content:start;
}

.province{
  background:white;
  border:1px solid rgba(0,0,0,0.12);
  border-radius:12px;
  padding:20px;
  cursor:pointer;
  transition:0.2s;
  position:relative;
  min-height:90px;
}

.province:hover{
  transform:scale(1.03);
  border-color:#185FA5;
}

.province h3{
  margin:0;
  font-size:14px;
}

.seats{
  font-size:12px;
  color:#666;
  margin-top:6px;
}

/* DOTS */
.dots{
  display:flex;
  flex-wrap:wrap;
  gap:4px;
  margin-top:10px;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
}

/* PARTIES */
.NVA{background:#F5A623;}
.PS{background:#C8001E;}
.MR{background:#005E9E;}
.VB{background:#FFD700;}
.GROEN{background:#5FAD41;}
.VOORUIT{background:#E8172B;}
.CDV{background:#F07D00;}
.PVDA{background:#8B0000;}
.ECOLO{background:#4CAF50;}
.ANDERS{background:#00AEEF;}

/* PANEL */
.panel{
  background:white;
  border-left:1px solid rgba(0,0,0,0.1);
  padding:24px;
  overflow:auto;
}

.panel h2{
  margin-top:0;
}

.rep{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid rgba(0,0,0,0.08);
  font-size:14px;
}

.party-tag{
  font-size:11px;
  padding:3px 8px;
  border-radius:999px;
  color:white;
}

/* HEADER COLORS */
.tag-NVA{background:#F5A623;color:#333;}
.tag-PS{background:#C8001E;}
.tag-MR{background:#005E9E;}
.tag-VB{background:#FFD700;color:#333;}
.tag-GROEN{background:#5FAD41;}
.tag-VOORUIT{background:#E8172B;}
.tag-CDV{background:#F07D00;}
.tag-PVDA{background:#8B0000;}
.tag-ECOLO{background:#4CAF50;}
.tag-ANDERS{background:#00AEEF;}

.small{
  color:#666;
  font-size:12px;
}
</style>
</head>

<body>

<header>
Federaal parlement — interactieve provinciale kaart
</header>

<div class="container">

  <!-- MAP -->
  <div class="map">

    <div class="province" onclick="openProvince('Antwerpen')">
      <h3>Antwerpen</h3>
      <div class="seats">24 zetels</div>
      <div class="dots">
        <div class="dot NVA"></div><div class="dot NVA"></div><div class="dot VB"></div>
        <div class="dot MR"></div><div class="dot VOORUIT"></div>
      </div>
    </div>

    <div class="province" onclick="openProvince('Oost-Vlaanderen')">
      <h3>Oost-Vlaanderen</h3>
      <div class="seats">20 zetels</div>
      <div class="dots">
        <div class="dot NVA"></div><div class="dot VOORUIT"></div>
        <div class="dot GROEN"></div><div class="dot VB"></div>
      </div>
    </div>

    <div class="province" onclick="openProvince('West-Vlaanderen')">
      <h3>West-Vlaanderen</h3>
      <div class="seats">16 zetels</div>
      <div class="dots">
        <div class="dot NVA"></div><div class="dot CDV"></div>
        <div class="dot VB"></div>
      </div>
    </div>

    <div class="province" onclick="openProvince('Vlaams-Brabant')">
      <h3>Vlaams-Brabant</h3>
      <div class="seats">15 zetels</div>
      <div class="dots">
        <div class="dot NVA"></div><div class="dot CDV"></div>
        <div class="dot VOORUIT"></div>
      </div>
    </div>

    <div class="province" onclick="openProvince('Limburg')">
      <h3>Limburg</h3>
      <div class="seats">12 zetels</div>
      <div class="dots">
        <div class="dot NVA"></div><div class="dot CDV"></div>
        <div class="dot VOORUIT"></div>
      </div>
    </div>

    <div class="province" onclick="openProvince('Brussel')">
      <h3>Brussel</h3>
      <div class="seats">15 zetels</div>
      <div class="dots">
        <div class="dot PS"></div><div class="dot MR"></div>
        <div class="dot ECOLO"></div><div class="dot PVDA"></div>
      </div>
    </div>

  </div>

  <!-- PANEL -->
  <div class="panel">
    <h2 id="title">Klik op een provincie</h2>
    <p class="small">Details verschijnen hier</p>
    <div id="list"></div>
  </div>

</div>

<script>
const data = {
  "Antwerpen":[
    ["Bart De Wever","NVA",187543],
    ["Tom Van Grieken","VB",156789],
    ["Caroline Gennez","VOORUIT",71234]
  ],
  "Oost-Vlaanderen":[
    ["Theo Francken","NVA",112456],
    ["Melissa Depraetere","VOORUIT",78456],
    ["Tinne Van der Straeten","GROEN",72108]
  ],
  "West-Vlaanderen":[
    ["Valerie Van Peel","NVA",89012],
    ["Tomas Roggeman","VB",72345]
  ],
  "Vlaams-Brabant":[
    ["Zuhal Demir","NVA",98234],
    ["Sammy Mahdi","CDV",65123]
  ],
  "Limburg":[
    ["Frieda Brepoels","NVA",67890],
    ["Lydia Peeters","ANDERS",65890]
  ],
  "Brussel":[
    ["Paul Magnette","PS",134567],
    ["George-Louis Bouchez","MR",89234],
    ["Peter Mertens","PVDA",78901]
  ]
};

function openProvince(name){
  document.getElementById("title").innerText = name;

  const list = document.getElementById("list");
  list.innerHTML = "";

  data[name].forEach(p => {
    list.innerHTML += `
      <div class="rep">
        <div>
          <b>${p[0]}</b><br>
          <span class="small">${p[2]} stemmen</span>
        </div>
        <div class="party-tag tag-${p[1]}">${p[1]}</div>
      </div>
    `;
  });
}
</script>

</body>
</html>
